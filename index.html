<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For you</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      color: #222;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      line-height: 1.6;
      margin: 4px 0;
    }
    textarea {
      width: 100%;
      min-height: 220px;
      box-sizing: border-box;
      margin-top: 16px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
      background: #fff;
    }
    button {
      margin-top: 12px;
      padding: 8px 16px;
      font-size: 14px;
      border-radius: 4px;
      border: 1px solid #222;
      background: #222;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background: #000;
    }
    .note {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>I'm Yihuan Chen.</h1>
    <p>This page exists for one quiet purpose: if you ever want to write to Renpeng, you can do it here.</p>

    <!-- 使用 FormSubmit 把内容发到 renpengwang@qq.com -->
    <form action="https://formsubmit.co/renpengwang@qq.com" method="POST">
      <textarea name="message" placeholder="Write anything you want to tell Renpeng."></textarea>
      <button type="submit">Send to Renpeng</button>
    </form>

    <p class="note">
      Your words will be sent to his inbox and kept together with the others.<br>
      There is no account here, just a small fixed place for what you want to say.
    </p>
  </div>
</body>
</html>
